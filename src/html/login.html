<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Decentralized Voting</title>
  <link rel="stylesheet" type="text/css" href="../css/base.css">
  <link rel="stylesheet" type="text/css" href="../css/login.css">
</head>

<body>
  <!-- Atmospheric Background Shapes -->
  <div class="md3-blur-shape blur-shape-1"></div>
  <div class="md3-blur-shape blur-shape-2"></div>
  <div class="login-wrapper">
    <div class="login-card animate-fade">
      <div class="login-header">
        <h1>Voting Portal</h1>
        <p>Sign in to your account</p>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label for="voter-id">Name</label>
          <input type="text" id="voter-id" name="voter-id" placeholder="Enter your name" required autocomplete="off">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Login</button>
      </form>
      <div class="footer">
        <p>Don't have an account? <a href="/signup.html">Sign up here</a></p>
      </div>
    </div>
    <div class="footer">
      <p>&copy; 2026 Decentralized Voting System</p>
    </div>
  </div>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
  <script src="../js/login.js" type="module"></script>
</body>

</html>
