<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Voter Dashboard - Decentralized Voting</title>
  <link rel="stylesheet" type="text/css" href="../css/base.css">
  <link rel="stylesheet" type="text/css" href="../css/index.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">VotingChain</div>
    <nav class="sidebar-nav">
      <a href="#dashboard" class="nav-item active">Dashboard</a>
      <a href="#voting" class="nav-item">Cast Vote</a>
      <a href="#results" class="nav-item">Results</a>
      <a href="#settings" class="nav-item">Settings</a>
    </nav>
    <div class="sidebar-footer">
      <a href="#" onclick="App.logout()" class="nav-item">Logout</a>
    </div>
  </aside>

  <!-- Top Navigation -->
  <header class="top-nav">
    <div class="nav-left">
      <h2 id="pageTitle">Voter Dashboard</h2>
    </div>
    <div class="nav-right">
      <button class="theme-toggle" onclick="App.toggleTheme()" id="themeBtn">🌙</button>
      <div class="profile-circle" id="profileInitials" onclick="location.href='#settings'">U</div>
    </div>
  </header>

  <!-- Main Content Area -->
  <main class="main-wrapper animate-fade">
    <div class="container">
      <div id="account" class="stagger-1" style="margin-bottom: 2rem;">
        <p id="accountAddress" class="account-pill"></p>
      </div>

      <div class="voting-grid">
        <!-- Voting Section -->
        <section id="voting" class="card hover-lift stagger-1">
          <div class="card-header">
            <h2>Cast Your Vote</h2>
            <p id="voting-status">Voting Cycle: <span id="dates"></span></p>
          </div>
          
          <div class="table-wrapper">
            <table class="minimal-table">
              <thead>
                <tr>
                  <th>Select</th>
                  <th>Candidate</th>
                  <th>Party</th>
                  <th>Votes</th>
                </tr>
              </thead>
              <tbody id="boxCandidate"></tbody>
            </table>
          </div>

          <div id="vote-controls" class="vote-footer">
            <p class="instruction">Choose your representative below.</p>
            <button id="voteButton" class="btn btn-primary" onclick="App.vote()" disabled>Confirm Vote</button>
            <div id="msg" class="status-msg"></div>
          </div>
        </section>

        <!-- Analytics Section -->
        <section id="results" class="card analytics-card hover-lift stagger-2">
          <div class="card-header">
            <h2>Live Results</h2>
            <p>Real-time standing per candidate</p>
          </div>
          <div class="chart-container">
            <canvas id="voteChart"></canvas>
          </div>
        </section>

        <!-- Settings Section -->
        <section id="settings" class="card full-width hover-lift stagger-3">
          <div class="card-header">
            <h2>Account Security</h2>
            <p>Update your credentials</p>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="newPassword">New Password</label>
              <input id="newPassword" type="password" placeholder="Enter new password">
            </div>
            <div class="form-group" style="display: flex; align-items: flex-end;">
              <button class="btn btn-primary" onclick="App.changePassword()">Update Password</button>
            </div>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
  <script src="../dist/app.bundle.js" type="module"></script>
</body>

</html>
